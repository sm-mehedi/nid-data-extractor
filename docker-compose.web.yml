services:
  nid-extractor-web:
    build: .
    # Identical image/build to docker-compose.yml — the only difference is
    # that this variant's build context includes frontend/, which app/main.py
    # auto-detects and mounts at GET / (see Section 5 of the build plan).
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_CLOUD_VISION_API_KEY=${GOOGLE_CLOUD_VISION_API_KEY:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-10}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-8}
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-4}
      - API_SHARED_SECRET=${API_SHARED_SECRET:-}
      - PORT=8000
